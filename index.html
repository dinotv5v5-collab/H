<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Thư viện của tôi</title>

<style>
body{
font-family: Arial;
text-align:center;
background:#f5f5f5;
}

h1{
margin-top:30px;
}

iframe{
border:1px solid gray;
margin-top:20px;
}
</style>

</head>

<body>

<h1>📚 Web đọc sách của Hưng</h1>

<input type="file" id="upload">

<br><br>

<iframe id="viewer" width="90%" height="800"></iframe>

<script>

const upload=document.getElementById("upload");
const viewer=document.getElementById("viewer");

upload.addEventListener("change",function(){

const file=this.files[0];

const url=URL.createObjectURL(file);

viewer.src=url;

});

</script>

</body>
</html>
